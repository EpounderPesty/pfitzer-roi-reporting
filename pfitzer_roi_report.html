function SectionHead({eyebrow,title}){
  return (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:C.red,marginBottom:4}}>{eyebrow}</div>

}

function Callout({type,children}){
  const cfg = {
    green: {bg:"#F0F7F4",border:C.green,label:""},
    gold:  {bg:"#FFF8EC",border:C.gold, label:""},
    red:   {bg:"#FDF0EF",border:C.red,  label:""},
    navy:  {bg:"#EEF1F7",border:C.navy, label:""},
  };
  const s = cfg[type]||cfg.navy;
  return (
    <div style={{background:s.bg,border:`1px solid ${s.border}`,borderLeft:`5px solid ${s.border}`,
      borderRadius:8,padding:"14px 18px",marginBottom:16,fontSize:13,color:C.navy,lineHeight:1.7}}>
      {children}
    </div>
  );
}

function RevTooltip({active,payload,label}){
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:C.navy,color:C.white,padding:"10px 14px",borderRadius:6,fontSize:12}}>
      <div style={{fontWeight:700,marginBottom:4}}>{label}</div>
      {payload.map(p=>(
        <div key={p.name} style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{width:8,height:8,borderRadius:2,background:p.fill||p.color,display:"inline-block"}}/>
          <span style={{color:"#BCC5DA"}}>{p.name}:</span>
          <span style={{fontWeight:700}}>{typeof p.value==="number"&&p.value>100?fmt$(p.value):p.value}</span>
        </div>
      ))}
    </div>
  );
}
